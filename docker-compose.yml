services:
  churn-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - model-cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATA_DIR=/data/raw
      - MODEL_PATH=/app/cache/model.pkl
      - FEATURES_PATH=/app/cache/features.json
      - MODEL_OUTPUT=/app/cache
    restart: unless-stopped

volumes:
  model-cache:
